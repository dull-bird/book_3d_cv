[book]
title = "3D 视觉：从原理到实践"
authors = ["戴智文"]
language = "zh"
src = "src"

[output.html]
git-repository-url = "https://github.com/dull-bird/book_3d_cv"
edit-url-template = "https://github.com/dull-bird/book_3d_cv/edit/main/{path}"
site-url = "/book_3d_cv/"
no-section-label = true
additional-js = ["theme/js/mathjax-mermaid.js", "theme/js/custom.js"]
additional-css = ["theme/css/custom.css"]

[output.html.search]
enable = true

[preprocessor.mermaid]
command = "mdbook-mermaid"

# mdbook 0.5.2 原生支持 GitHub-style alerts，无需外部 preprocessor
